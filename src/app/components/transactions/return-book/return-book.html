<div class="return-container">
    <mat-card>
        <mat-card-header>
            <mat-card-title>Return a Book</mat-card-title>
        </mat-card-header>
        <mat-card-content>
            @if (issuedBooks().length === 0) {
            <p class="no-data">You have no issued books</p>
            } @else {
            <table mat-table [dataSource]="issuedBooks()" class="return-table">
                <ng-container matColumnDef="book_title">
                    <th mat-header-cell *matHeaderCellDef>Book</th>
                    <td mat-cell *matCellDef="let transaction">{{ transaction.book_title }}</td>
                </ng-container>

                <ng-container matColumnDef="issue_date">
                    <th mat-header-cell *matHeaderCellDef>Issue Date</th>
                    <td mat-cell *matCellDef="let transaction">
                        {{ transaction.issue_date | date : 'short' }}
                    </td>
                </ng-container>

                <ng-container matColumnDef="due_date">
                    <th mat-header-cell *matHeaderCellDef>Due Date</th>
                    <td mat-cell *matCellDef="let transaction">
                        {{ transaction.due_date | date : 'short' }}
                    </td>
                </ng-container>

                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef>Actions</th>
                    <td mat-cell *matCellDef="let transaction">
                        <button mat-raised-button color="primary" (click)="returnBook(transaction)">
                            Return
                        </button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
            </table>
            }
        </mat-card-content>
    </mat-card>
</div>
